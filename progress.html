<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dashboard progress belajar CSS dengan materi selesai, skor quiz, recall, debugging, dan badge." />
    <title>Progress CSS - CSS Beginner Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css?v=20260617" />
  </head>
  <body data-page="progress">
    <div id="appNav"></div>

    <main>
      <section class="page-hero">
        <div class="container">
          <span class="eyebrow"><i class="bi bi-graph-up-arrow"></i> Progress</span>
          <h1>Lihat perjalanan belajar CSS kamu</h1>
          <p>Progress, badge, tema gelap, dan materi terakhir tersimpan otomatis di browser yang kamu pakai.</p>
        </div>
      </section>

      <section class="section-block progress-section">
        <div class="container">
          <div class="progress-dashboard">
            <div class="progress-overview">
              <div class="d-flex justify-content-between gap-3 align-items-start flex-wrap">
                <div>
                  <span class="mini-label">Total progress</span>
                  <div class="progress-value"><strong id="progressPercent">0%</strong><span>selesai</span></div>
                </div>
                <button class="btn btn-soft" type="button" id="resetProgress"><i class="bi bi-arrow-counterclockwise"></i> Reset progress</button>
              </div>
              <div class="progress app-progress" role="progressbar" aria-label="Progress belajar" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar" id="mainProgressBar" style="width: 0%"></div>
              </div>
              <p class="recommendation" id="nextRecommendation"></p>
            </div>

            <div class="stats-grid">
              <div class="stat-card"><i class="bi bi-journal-check"></i><strong id="statLessons">0</strong><span>materi selesai</span></div>
              <div class="stat-card"><i class="bi bi-patch-question"></i><strong id="statQuiz">0</strong><span>rata-rata quiz</span></div>
              <div class="stat-card"><i class="bi bi-arrow-repeat"></i><strong id="statRecall">0</strong><span>recall selesai</span></div>
              <div class="stat-card"><i class="bi bi-bug"></i><strong id="statDebug">0</strong><span>debugging selesai</span></div>
            </div>

            <div class="badge-panel">
              <div class="d-flex align-items-center gap-3 mb-3">
                <i class="bi bi-award badge-panel-icon"></i>
                <div>
                  <span class="mini-label">Badge</span>
                  <h3>Achievement belajar</h3>
                </div>
              </div>
              <div class="badge-grid" id="badgeGrid"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="appFooter"></div>
    <div id="appToast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js?v=20260617"></script>
    <script src="assets/js/progress.js?v=20260617"></script>
    <script src="assets/js/layout.js?v=20260617"></script>
    <script src="assets/js/app.js?v=20260617"></script>
  </body>
</html>
