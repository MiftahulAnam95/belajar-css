<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Editor HTML dan CSS interaktif untuk mencoba kode dan melihat hasilnya langsung di browser." />
    <title>Editor CSS - CSS Beginner Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-page="editor">
    <div id="appNav"></div>

    <main>
      <section class="page-hero">
        <div class="container">
          <span class="eyebrow"><i class="bi bi-code-square"></i> Editor</span>
          <h1>Coba HTML + CSS dan lihat hasilnya langsung</h1>
          <p>Tulis struktur HTML, tambahkan CSS, lalu jalankan preview tanpa perlu install aplikasi apa pun.</p>
        </div>
      </section>

      <section class="section-block editor-section">
        <div class="container">
          <div class="editor-toolbar">
            <div class="template-group" id="templateButtons"></div>
            <div class="editor-actions">
              <button class="btn btn-run" type="button" id="runPreview"><i class="bi bi-play-fill"></i> Jalankan</button>
              <button class="btn btn-soft" type="button" id="copyEditor"><i class="bi bi-copy"></i> Salin</button>
              <button class="btn btn-soft" type="button" id="resetEditor"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
            </div>
          </div>

          <div class="editor-grid">
            <div class="editor-shell">
              <div class="editor-head">
                <span><i class="bi bi-filetype-html"></i> index.html</span>
              </div>
              <textarea class="code-input" id="htmlInput" spellcheck="false"></textarea>
            </div>
            <div class="editor-shell">
              <div class="editor-head">
                <span><i class="bi bi-filetype-css"></i> style.css</span>
              </div>
              <textarea class="code-input" id="cssInput" spellcheck="false"></textarea>
            </div>
            <div class="preview-shell">
              <div class="preview-head">
                <span><i class="bi bi-browser-chrome"></i> Preview</span>
              </div>
              <iframe id="previewFrame" title="Preview HTML dan CSS"></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="appFooter"></div>
    <div id="appToast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/progress.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
